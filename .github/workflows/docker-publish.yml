name: CD - Build and Push Docker Images

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: docker.io
      DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images
        uses: docker/build-push-action@v6
        with:
          context: ./movie-ticket-system
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/api-gateway:latest
            ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/user-service:latest
            ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/hall-service:latest
            ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/booking-service:latest
            ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/movie-service:latest
            ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/payment-service:latest
            ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/review-service:latest
            ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/discount-service:latest
            ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/analytics-service:latest
