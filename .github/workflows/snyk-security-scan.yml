name: DevSecOps - Snyk Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  snyk-node:
    name: Snyk scan - Node.js services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: 
          - "api-gateway"
          - "user-service"
          - "hall-service"
          - "booking-service"
          - "analytics-service"
          - "discount-service"
          - "movie-service"
          - "review-service"
          - "payment-service"
    defaults:
      run:
        working-directory: movie-ticket-system/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium

