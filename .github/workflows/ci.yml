name: CI - Build and Verify Microservices

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  node-services:
    name: Build Node.js services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: 
          - "api-gateway"
          - "user-service"
          - "hall-service"
          - "booking-service"
          - "review-service"
          - "discount-service"
          - "analytics-service"
          - "movie-service"
          - "payment-service"
    defaults:
      run:
        working-directory: movie-ticket-system/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
