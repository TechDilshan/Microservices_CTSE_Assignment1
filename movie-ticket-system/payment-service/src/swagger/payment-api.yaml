openapi: 3.0.3
info:
  title: Payment Service API
  version: "1.0"
  description: Movie Ticket Payment Microservice
servers:
  - url: /
paths:
  /api/payments:
    get:
      summary: Get all payments
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      summary: Create a new payment for a booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCreate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
  /api/payments/{id}:
    get:
      summary: Get payment by payment ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentNullable"
    delete:
      summary: Delete or cancel a payment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
  /api/payments/booking/{bookingId}:
    get:
      summary: Get payments by booking ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
  /api/payments/{id}/status:
    put:
      summary: Update payment status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: status
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentNullable"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PaymentCreate:
      type: object
      properties:
        bookingId:
          type: string
        userId:
          type: string
        amount:
          type: number
        method:
          type: string
      required:
        - bookingId
        - amount
    Payment:
      type: object
      properties:
        id:
          type: string
        bookingId:
          type: string
        userId:
          type: string
        amount:
          type: number
        method:
          type: string
        status:
          type: string
    PaymentNullable:
      anyOf:
        - $ref: "#/components/schemas/Payment"
        - type: "null"

