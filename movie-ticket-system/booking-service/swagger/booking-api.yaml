openapi: 3.0.0
info:
  title: Booking Service API
  version: 1.0.0
  description: API documentation for the Booking microservice handling reservations and seat allocations.

servers:
  - url: http://localhost:3003
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Booking:
      type: object
      required:
        - userId
        - hallId
        - movieId
        - showTime
        - date
        - seats
      properties:
        _id:
          type: string
          example: 60d21b4667d0d8992e610c85
        userId:
          type: string
          example: 60d21b4667d0d8992e610c80
        hallId:
          type: string
          example: 60d21b4667d0d8992e610c81
        movieId:
          type: string
          example: 60d21b4667d0d8992e610c82
        showTime:
          type: string
          example: "14:30"
        date:
          type: string
          format: date
          example: "2023-11-20"
        seats:
          type: array
          items:
            type: string
          example: ["A1", "A2", "B5"]
        status:
          type: string
          example: "pending"
        paymentStatus:
          type: string
          example: "pending"
        createdAt:
          type: string
          format: date-time

paths:
  /api/bookings:
    get:
      summary: Get all bookings (Admin/Hall Owner)
      description: Retrieve all bookings. Requires Hall Owner or Admin permissions.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: A list of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

    post:
      summary: Create booking
      description: Creates a new movie ticket booking for the authenticated user.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - hallId
                - movieId
                - showTime
                - date
                - seats
              properties:
                hallId:
                  type: string
                movieId:
                  type: string
                showTime:
                  type: string
                date:
                  type: string
                  format: date
                seats:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Booking created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Missing fields or seats not available

  /api/bookings/available-seats:
    get:
      summary: Get available seats
      description: Retrieve available seats for a specific movie screening.
      tags:
        - Bookings
      parameters:
        - in: query
          name: hallId
          required: true
          schema:
            type: string
        - in: query
          name: movieId
          required: true
          schema:
            type: string
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: showTime
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Available seats data returned
        "400":
          description: Missing query parameters

  /api/bookings/user:
    get:
      summary: Get user bookings
      description: Retrieve all bookings belonging to the currently authenticated user.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User bookings retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /api/bookings/payments:
    get:
      summary: Get payments for my bookings (Admin/Hall Owner)
      description: Retrieve all payments mapped to bookings belonging to the Hall Owner's halls.
      tags:
        - Payments integration
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of payments

  /api/bookings/payments/{paymentId}/status:
    put:
      summary: Update payment status (Admin/Hall Owner)
      description: Allows a Hall Owner or Admin to update the status of a payment.
      tags:
        - Payments integration
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: paymentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
      responses:
        "200":
          description: Payment status updated successfully
        "403":
          description: Unauthorized to update this payment
        "404":
          description: Payment not found

  /api/bookings/payments/{paymentId}:
    delete:
      summary: Delete payment (Admin/Hall Owner)
      description: Deletes a payment record.
      tags:
        - Payments integration
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: paymentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment deleted successfully
        "403":
          description: Unauthorized to delete this payment
        "404":
          description: Payment not found

  /api/bookings/{id}/pay:
    post:
      summary: Pay for booking
      description: Initiate payment for a booking that belongs to the user.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                method:
                  type: string
                  default: "card"
      responses:
        "200":
          description: Payment successful
        "400":
          description: Booking already paid
        "403":
          description: Can only pay for your own booking
        "404":
          description: Booking not found

  /api/bookings/{id}:
    get:
      summary: Get booking by ID
      description: Retrieve specific booking details. User must own the booking, or be an admin/hall owner of that hall.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking details retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "403":
          description: Access denied
        "404":
          description: Booking not found

    put:
      summary: Update booking (Admin/Hall Owner)
      description: Update booking information.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                paymentStatus:
                  type: string
      responses:
        "200":
          description: Booking updated successfully
        "404":
          description: Booking not found

    delete:
      summary: Delete booking (Admin/Hall Owner)
      description: Deletes a specific booking.
      tags:
        - Bookings
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking deleted successfully
        "500":
          description: Delete failed