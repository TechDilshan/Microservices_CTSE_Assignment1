openapi: 3.0.0
info:
  title: Hall Service API
  description: API documentation for the Hall microservice in the Movie Ticket System.
  version: 1.0.0

servers:
  - url: http://localhost:3005
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Hall:
      type: object
      required:
        - hallOwnerId
        - name
        - location
      properties:
        _id:
          type: string
          example: 60d21b4667d0d8992e610c85
        hallOwnerId:
          type: string
          example: 60d21b4667d0d8992e610c84
        name:
          type: string
          example: "Grand Cinema Hall A"
        location:
          type: string
          example: "Colombo City Center"
        hallImageUrl:
          type: string
          example: "https://example.com/images/hall-a.jpg"
        createdAt:
          type: string
          format: date-time
          example: "2023-01-01T10:00:00.000Z"

    SeatBlock:
      type: object
      required:
        - hallId
        - odc
      properties:
        _id:
          type: string
          example: 60d21b4667d0d8992e610c85
        hallId:
          type: string
          example: 60d21b4667d0d8992e610c85
        numSeats:
          type: object
          properties:
            ODC:
              type: integer
              example: 30
            Balcony:
              type: integer
              example: 4
            Box:
              type: integer
              example: 5
        odc:
          type: object
          properties:
            rows:
              type: integer
              example: 5
            columns:
              type: integer
              example: 6
        createdAt:
          type: string
          format: date-time

paths:
  /api/halls:
    get:
      summary: Get halls
      description: Retrieve a list of halls. If a Hall Owner is logged in, returns only their halls.
      tags:
        - Halls
      security:
        - bearerAuth: []
      responses:
        "200":
          description: A list of halls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hall"

    post:
      summary: Create hall (Admin)
      description: Creates a new hall in the system. Requires Admin role.
      tags:
        - Halls
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - hallOwnerId
                - name
                - location
              properties:
                hallOwnerId:
                  type: string
                name:
                  type: string
                location:
                  type: string
                hallImageUrl:
                  type: string
      responses:
        "201":
          description: Hall created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hall"

  /api/halls/owner/{ownerId}:
    get:
      summary: Get halls by owner ID (Admin)
      description: Retrieve all halls belonging to a specific owner. Requires Admin role.
      tags:
        - Halls
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: ownerId
          schema:
            type: string
          required: true
          description: The ID of the owner
      responses:
        "200":
          description: A list of halls for the owner
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hall"

  /api/halls/{id}:
    get:
      summary: Get hall by ID
      description: Retrieve a specific hall by its ID.
      tags:
        - Halls
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: The ID of the hall to retrieve
      responses:
        "200":
          description: Hall details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hall"
        "404":
          description: Hall not found

    put:
      summary: Update hall (Admin/Hall Owner)
      description: Updates the details of an existing hall.
      tags:
        - Halls
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: The ID of the hall to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                location:
                  type: string
                hallImageUrl:
                  type: string
      responses:
        "200":
          description: Hall updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hall"
        "403":
          description: Forbidden access
        "404":
          description: Hall not found

    delete:
      summary: Delete hall (Admin/Hall Owner)
      description: Deletes a hall from the system.
      tags:
        - Halls
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: The ID of the hall to delete
      responses:
        "200":
          description: Hall deleted successfully
        "403":
          description: Forbidden access
        "404":
          description: Hall not found

  /api/halls/{hallId}/seat-block:
    get:
      summary: Get seat block
      description: Retrieve seat block configuration for a specific hall.
      tags:
        - Seat Block
      parameters:
        - in: path
          name: hallId
          schema:
            type: string
          required: true
          description: The ID of the hall
      responses:
        "200":
          description: Seat block details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeatBlock"
        "404":
          description: Seat block not found

    put:
      summary: Create/Update seat block (Hall Owner)
      description: Creates or updates the seat block configuration for a hall.
      tags:
        - Seat Block
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: hallId
          schema:
            type: string
          required: true
          description: The ID of the hall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                numSeats:
                  type: object
                  properties:
                    ODC:
                      type: integer
                    Balcony:
                      type: integer
                    Box:
                      type: integer
                odc:
                  type: object
                  properties:
                    rows:
                      type: integer
                    columns:
                      type: integer
      responses:
        "200":
          description: Seat block updated/created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeatBlock"
        "403":
          description: Forbidden access

  /api/halls/{hallId}/seat-layout:
    get:
      summary: Get seat layout
      description: Retrieves the formatted seat layout structure.
      tags:
        - Seat Block
      parameters:
        - in: path
          name: hallId
          schema:
            type: string
          required: true
          description: The ID of the hall
      responses:
        "200":
          description: Seat layout structure
          content:
            application/json:
              schema:
                type: object
                description: The visual layout of seats for the hall
        "404":
          description: Layout not found
