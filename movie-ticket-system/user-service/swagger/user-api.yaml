openapi: 3.0.0
info:
  title: User Service API
  description: User management service for Movie Ticket Reservation System
  version: 1.0.0

servers:
  - url: http://localhost:3001

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        createdAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          example: john@email.com
        password:
          type: string
          example: 123456

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string

paths:

  /api/users/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        201:
          description: User registered successfully
        400:
          description: Email already exists
        500:
          description: Server error


  /api/users/login:
    post:
      summary: Login user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        401:
          description: Invalid credentials


  /api/users/profile:

    get:
      summary: Get logged in user profile
      tags:
        - User
      security:
        - bearerAuth: []
      responses:
        200:
          description: Profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        401:
          description: Unauthorized

    put:
      summary: Update logged in user profile
      tags:
        - User
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
      responses:
        200:
          description: Profile updated
        401:
          description: Unauthorized

    delete:
      summary: Delete logged in user account
      tags:
        - User
      security:
        - bearerAuth: []
      responses:
        200:
          description: User deleted
        401:
          description: Unauthorized


  /api/users:

    get:
      summary: Get all users
      tags:
        - Admin
      responses:
        200:
          description: List of users returned


  /api/users/{id}:

    get:
      summary: Get user by ID
      tags:
        - Admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: User returned
        404:
          description: User not found

    put:
      summary: Update user by ID
      tags:
        - Admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: User updated

    delete:
      summary: Delete user by ID
      tags:
        - Admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: User deleted