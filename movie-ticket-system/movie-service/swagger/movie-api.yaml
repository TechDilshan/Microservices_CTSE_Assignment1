openapi: 3.0.0
info:
  title: Movie Service API
  description: Movie and Showtime management service for Movie Ticket Reservation System
  version: 1.0.0

servers:
  - url: http://localhost:8000

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Movie:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        genre:
          type: string
        duration:
          type: integer
        language:
          type: string
        release_date:
          type: string

    MovieCreate:
      type: object
      required:
        - title
        - genre
        - duration
        - language
        - release_date
      properties:
        title:
          type: string
          example: Avengers Endgame
        genre:
          type: string
          example: Action
        duration:
          type: integer
          example: 180
        language:
          type: string
          example: English
        release_date:
          type: string
          example: 2019-04-26

    Show:
      type: object
      properties:
        id:
          type: string
        movie_id:
          type: string
        theatre:
          type: string
        time:
          type: string
        available_seats:
          type: integer

    ShowCreate:
      type: object
      required:
        - movie_id
        - theatre
        - time
        - available_seats
      properties:
        movie_id:
          type: string
        theatre:
          type: string
          example: Cinema City Hall 1
        time:
          type: string
          example: "18:30"
        available_seats:
          type: integer
          example: 120

paths:

  /api/movies:

    post:
      summary: Create movie
      tags:
        - Movies
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovieCreate'
      responses:
        200:
          description: Movie created

    get:
      summary: Get all movies
      tags:
        - Movies
      responses:
        200:
          description: List of movies


  /api/movies/{id}:

    get:
      summary: Get movie by ID
      tags:
        - Movies
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Movie returned
        404:
          description: Movie not found

    put:
      summary: Update movie
      tags:
        - Movies
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovieCreate'
      responses:
        200:
          description: Movie updated

    delete:
      summary: Delete movie
      tags:
        - Movies
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Movie deleted


  /api/shows:

    post:
      summary: Create showtime
      tags:
        - Shows
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShowCreate'
      responses:
        200:
          description: Show created

    get:
      summary: Get all shows
      tags:
        - Shows
      responses:
        200:
          description: List of shows


  /api/shows/{id}:

    get:
      summary: Get show by ID
      tags:
        - Shows
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Show returned

    put:
      summary: Update show
      tags:
        - Shows
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShowCreate'
      responses:
        200:
          description: Show updated

    delete:
      summary: Delete show
      tags:
        - Shows
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Show deleted