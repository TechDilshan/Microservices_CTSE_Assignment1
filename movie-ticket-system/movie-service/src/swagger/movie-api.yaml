openapi: 3.0.0
info:
  title: Movie Service API
  description: Movie management service for Movie Ticket Reservation System
  version: 1.0.0

servers:
  - url: http://localhost:8000

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Movie:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        genre:
          type: string
        duration:
          type: integer
        language:
          type: string
        release_date:
          type: string

    MovieCreate:
      type: object
      required:
        - title
        - genre
        - duration
        - language
        - release_date
      properties:
        title:
          type: string
          example: Avengers Endgame
        genre:
          type: string
          example: Action
        duration:
          type: integer
          example: 180
        language:
          type: string
          example: English
        release_date:
          type: string
          example: 2019-04-26

paths:

  /api/movies:

    post:
      summary: Create movie
      tags:
        - Movies
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovieCreate'
      responses:
        200:
          description: Movie created

    get:
      summary: Get all movies
      tags:
        - Movies
      parameters:
        - in: query
          name: hallId
          schema:
            type: string
          required: false
          description: Filter movies by hallId
      responses:
        200:
          description: List of movies


  /api/movies/{id}:

    get:
      summary: Get movie by ID
      tags:
        - Movies
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Movie returned
        404:
          description: Movie not found

    put:
      summary: Update movie
      tags:
        - Movies
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovieCreate'
      responses:
        200:
          description: Movie updated

    delete:
      summary: Delete movie
      tags:
        - Movies
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Movie deleted