openapi: 3.0.0
info:
  title: Discount Service API
  version: 1.0.0
  description: Discount management and calculation service

servers:
  - url: http://localhost:3020

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:

  /api/discounts:

    post:
      summary: Create discount
      description: Create a discount (Hall Owner/Admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - hallId
                - type
                - percentage
              properties:
                hallId:
                  type: string
                movieId:
                  type: string
                type:
                  type: string
                  enum: [DATE, SEAT_COUNT]
                date:
                  type: string
                  format: date
                minSeats:
                  type: integer
                percentage:
                  type: number
                description:
                  type: string
      responses:
        201:
          description: Discount created
        400:
          description: Bad Request

  /api/discounts/mine:

    get:
      summary: Get my discounts
      description: List discounts for current hall owner
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of discounts

  /api/discounts/{id}:

    put:
      summary: Update discount
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hallId:
                  type: string
                movieId:
                  type: string
                type:
                  type: string
                  enum: [DATE, SEAT_COUNT]
                date:
                  type: string
                  format: date
                minSeats:
                  type: integer
                percentage:
                  type: number
                description:
                  type: string
                active:
                  type: boolean

      responses:
        200:
          description: Discount updated
        400:
          description: Bad Request
        403:
          description: Forbidden
        404:
          description: Not Found
          
    delete:
      summary: Delete discount
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Discount deleted
        403:
          description: Forbidden
        404:
          description: Not Found

  /api/discounts/applicable:

    get:
      summary: Get applicable discounts
      description: Public endpoint to get applicable discounts for a movie setup
      parameters:
        - in: query
          name: hallId
          required: true
          schema:
            type: string
        - in: query
          name: movieId
          required: false
          schema:
            type: string
        - in: query
          name: date
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: seats
          required: false
          schema:
            type: integer
      responses:
        200:
          description: List of applicable discounts
        400:
          description: Bad Request

  /api/discounts/calculate:

    post:
      summary: Calculate best discount
      description: Calculate the best applicable discount format
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - hallId
                - date
                - seats
              properties:
                hallId:
                  type: string
                movieId:
                  type: string
                date:
                  type: string
                  format: date
                seats:
                  type: array
                  items:
                    type: string
                baseAmount:
                  type: number
      responses:
        200:
          description: Best single discount applied calculation result
        400:
          description: Bad Request